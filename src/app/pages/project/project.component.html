<section class="projects-section py-5" id="myproject">
  <div class="container">

    <!-- Section Title -->
    <div class="text-center mb-5">
      <h2 class="section-title">My Projects</h2>
      <p class="section-subtitle">Some of my recent works and experiments</p>
    </div>

    <div class="row g-4">

      <!-- Project Card -->
      <div class="col-md-6 col-lg-4" *ngFor="let project of projects">
        <div class="project-card">

          <!-- Image with Overlay -->
          <div class="project-img">
            <img [src]="project.image" class="img-fluid" alt="Project Image">

            <div class="project-overlay">
              <h5>{{ project.title }}</h5>
              <p>{{ project.description }}</p>
              <a [href]="project.github" target="_blank" class="btn btn-gradient btn-sm">
                View Code
              </a>
            </div>
          </div>

          <!-- Content -->
          <div class="project-content">
            <h5>{{ project.title }}</h5>
            <p>{{ project.description }}</p>

            <!-- Tech Stack -->
            <div class="tech-stack">
              <span *ngFor="let tech of project.tech">{{ tech }}</span>
            </div>

            <!-- Buttons -->
            <div class="mt-3 d-flex gap-2">
              <a [href]="project.github" target="_blank" class="btn btn-outline-light btn-sm">
                GitHub
              </a>

              <a *ngIf="project.demo"
                 [href]="project.demo"
                 target="_blank"
                 class="btn btn-gradient btn-sm">
                Live Demo
              </a>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>
</section>
